<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Conversor EUR - PLN</title>
    <!-- Configuración para modo App (PWA) -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <style>
        :root {
            --bg-color: #f4f6f9;
            --card-bg: #ffffff;
            --text-color: #1a1a1a;
            --text-secondary: #666666;
            --accent-color: #0070f3;
            --border-color: #e0e0e0;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.08);
        }

        [data-theme="dark"] {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #f5f5f5;
            --text-secondary: #aaaaaa;
            --accent-color: #3291ff;
            --border-color: #333333;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            transition: background-color 0.3s;
            padding: 16px;
        }

        .app-container {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 24px;
            width: 100%;
            max-width: 400px;
            box-shadow: var(--shadow);
            transition: background-color 0.3s, box-shadow 0.3s;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .header h1 {
            font-size: 1.4rem;
            font-weight: 700;
        }

        .theme-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 4px;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 6px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .currency-badge {
            position: absolute;
            left: 16px;
            font-weight: 700;
            font-size: 1.2rem;
            color: var(--text-secondary);
        }

        input {
            width: 100%;
            padding: 16px 16px 16px 64px;
            font-size: 1.6rem;
            font-weight: 600;
            border: 2px solid var(--border-color);
            border-radius: 14px;
            background: transparent;
            color: var(--text-color);
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: var(--accent-color);
        }

        .info-box {
            background: rgba(0, 112, 243, 0.05);
            border-radius: 12px;
            padding: 12px;
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        [data-theme="dark"] .info-box {
            background: rgba(50, 145, 255, 0.08);
        }

        .sync-btn {
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
        }

        .sync-btn:active {
            opacity: 0.8;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1>🇵🇱 Polonia Conversor Euro 🇪🇺</h1>
        <button class="theme-btn" id="themeToggle" onclick="toggleTheme()">🌓</button>
    </div>

    <div class="input-group">
        <label for="eurInput">Euros</label>
        <div class="input-wrapper">
            <span class="currency-badge">€</span>
            <input type="number" id="eurInput" placeholder="0" step="any" inputmode="decimal" oninput="convert('eur')">
        </div>
    </div>

    <div class="input-group">
        <label for="plnInput">Eslonatis (PLN)</label>
        <div class="input-wrapper">
            <span class="currency-badge">zł</span>
            <input type="number" id="plnInput" placeholder="0" step="any" inputmode="decimal" oninput="convert('pln')">
        </div>
    </div>

    <div class="info-box">
        <div>
            <span>Cambio: <strong id="rateLabel">Cargando...</strong></span><br>
            <span style="font-size: 0.75rem; opacity: 0.8;" id="timeLabel">Actualizando...</span>
        </div>
        <button class="sync-btn" onclick="fetchRates()">Actualizar</button>
    </div>
</div>

<script>
    // Tasa por defecto inicial aproximada de 2026
    let eurToPlnRate = 4.29; 

    // Inicializar tema y datos al cargar
    document.addEventListener('DOMContentLoaded', () => {
        // Recuperar tema preferido
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
        
        // Recuperar última tasa guardada offline
        const savedRate = localStorage.getItem('eur_to_pln_rate');
        if (savedRate) {
            eurToPlnRate = parseFloat(savedRate);
            updateRateUI();
        }
        
        fetchRates();
    });

    function toggleTheme() {
        const currentTheme = document.documentElement.getAttribute('data-theme');
        const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', newTheme);
        localStorage.setItem('theme', newTheme);
    }

    async function fetchRates() {
        const rateLabel = document.getElementById('rateLabel');
        const timeLabel = document.getElementById('timeLabel');
        
        try {
            const response = await fetch('https://open.er-api.com/v6/latest/EUR');
            if (!response.ok) throw new Error('Error en red');
            const data = await response.json();
            
            if (data.rates && data.rates.PLN) {
                eurToPlnRate = data.rates.PLN;
                localStorage.setItem('eur_to_pln_rate', eurToPlnRate);
                updateRateUI();
                
                const now = new Date();
                timeLabel.innerText = `Act: ${now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}`;
            }
        } catch (error) {
            console.log('Modo offline detectado o error de API. Usando última guardada.');
            updateRateUI();
            timeLabel.innerText = "Modo sin conexión (Datos guardados)";
        }
    }

    function updateRateUI() {
        document.getElementById('rateLabel').innerText = `1 € = ${eurToPlnRate.toFixed(4)} zł`;
    }

    function convert(source) {
        const eurInput = document.getElementById('eurInput');
        const plnInput = document.getElementById('plnInput');

        if (source === 'eur') {
            const eurValue = parseFloat(eurInput.value);
            if (!isNaN(eurValue)) {
                plnInput.value = (eurValue * eurToPlnRate).toFixed(2);
            } else {
                plnInput.value = '';
            }
        } else if (source === 'pln') {
            const plnValue = parseFloat(plnInput.value);
            if (!isNaN(plnValue)) {
                eurInput.value = (plnValue / eurToPlnRate).toFixed(2);
            } else {
                eurInput.value = '';
            }
        }
    }
</script>

</body>
</html>
